spring.application.name=smart-campus-backend
server.port=8081

# Active profile — use 'local' for development
spring.profiles.active=local

# MongoDB
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/smartcampus}

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_OAUTH_CLIENT_ID:YOUR_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET:YOUR_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# GitHub OAuth2
spring.security.oauth2.client.registration.github.client-id=${GITHUB_OAUTH_CLIENT_ID:YOUR_GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_OAUTH_CLIENT_SECRET:YOUR_GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=read:user,user:email
spring.security.oauth2.client.registration.github.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# Frontend URL (for CORS and redirects)
app.frontend-url=http://localhost:5173

# Admin emails (comma-separated) — automatically assigned ADMIN role
app.admin-emails=admin@smartcampus.edu

# JWT
app.jwt.secret=${APP_JWT_SECRET:smartcampus-super-secret-jwt-key-change-me-2026-32bytes-min}
app.jwt.expiration-minutes=120